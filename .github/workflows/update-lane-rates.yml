name: Update Freight Calculator Lane Rates

on:
  schedule:
    # About every 3 days at 13:15 UTC.
    # GitHub schedules use UTC and day-of-month stepping, so this is not exact 72-hour timing across month boundaries.
    - cron: "15 13 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lane-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update 3-day semi-dynamic lane rates
        env:
          # Optional: comma-separated public pages you want the parser to try in addition to the defaults.
          EXTRA_RATE_SOURCE_URLS: ${{ vars.EXTRA_RATE_SOURCE_URLS }}
        run: node scripts/update-lane-rates.mjs

      - name: Commit updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/lane-rates.json data/lane-rates-history.json
          if git diff --cached --quiet; then
            echo "No lane-rate changes to commit."
          else
            git commit -m "Update 3-day freight lane rates"
            git push
          fi
