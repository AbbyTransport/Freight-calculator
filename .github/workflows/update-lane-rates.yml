name: Update Freight Calculator Lane Rates

on:
  schedule:
    # Runs daily, but the updater only writes a new market snapshot every 72 hours.
    # GitHub cron is UTC; 13:15 UTC is usually morning in Utah.
    - cron: "15 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lane-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update 3-day multi-source lane rates
        env:
          UPDATE_INTERVAL_HOURS: "72"
          FORCE_RATE_UPDATE: ${{ github.event_name == 'workflow_dispatch' }}
          # Optional: comma-separated public pages you want the parser to try in addition to the defaults.
          EXTRA_RATE_SOURCE_URLS: ${{ vars.EXTRA_RATE_SOURCE_URLS }}
        run: node scripts/update-lane-rates.mjs

      - name: Commit updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/lane-rates.json data/lane-rates-history.json
          if git diff --cached --quiet; then
            echo "No lane-rate changes to commit."
          else
            git commit -m "Update 3-day multi-source freight lane rates"
            git push
          fi
